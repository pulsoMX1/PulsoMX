title: "NotiRápido"
description: "Las noticias más relevantes de México y el mundo, al instante."
baseurl: ""
url: "https://TU-USUARIO.github.io/notirapido"
lang: "es-MX"
timezone: "America/Mexico_City"

# Author
author:
  name: "NotiRápido"
  email: "contacto@notirapido.com"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Pagination
paginate: 12
paginate_path: "/page:num/"

# Collections
collections:
  posts:
    output: true

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "NotiRápido"

# Exclude from build
exclude:
  - scripts/
  - .github/
  - Gemfile
  - Gemfile.lock
  - README.md

# SEO & Social
twitter:
  username: notirapido
facebook:
  app_id: ""
  publisher: ""

# Google Analytics (agrega tu ID después)
google_analytics: ""

# AdSense (agrega tu publisher ID después)
adsense_publisher: ""
adsense_slot_header: ""
adsense_slot_article: ""
adsense_slot_sidebar: ""
